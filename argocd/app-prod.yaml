apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-platform-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anasgrt/llm-platform-poc.git
    targetRevision: main
    path: deploy/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform
  # Prod is manual-sync: promotion happens by editing overlays/prod and
  # confirming the sync in ArgoCD UI. selfHeal still reverts cluster drift.
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
