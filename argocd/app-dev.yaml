apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-platform-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anasgrt/llm-platform-poc.git
    targetRevision: main
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    # Resources carry their own namespaces (ai-platform, monitoring) — Argo
    # respects those. This field is the default for namespace-scoped resources
    # missing one, which shouldn't happen here but is required by the schema.
    namespace: ai-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
