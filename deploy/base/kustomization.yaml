apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources span ai-platform and monitoring namespaces, so we don't set a
# top-level namespace here — each manifest declares its own.
#
# 05-ingestion-job.yaml is intentionally excluded: it's a one-shot Job that
# depends on the `sample-logs` ConfigMap created out-of-band by setup.sh.
# Re-introduce via a dedicated Application or move ingestion to a CronJob.
resources:
  - 00-namespace.yaml
  - 01-qdrant.yaml
  - 02-qwen3-server.yaml
  - 03-embedding-server.yaml
  - 04-rag-app.yaml
  - 06-ingress.yaml
  - 07-monitoring.yaml
  - 08-fluent-bit.yaml
  - 09-log-retention.yaml

# In-house images. Overlays set `newTag` to the git SHA pushed by CI.
# Listing them here lets `kustomize edit set image` resolve cleanly.
images:
  - name: ghcr.io/anasgrt/qwen3-server
  - name: ghcr.io/anasgrt/embedding-server
  - name: ghcr.io/anasgrt/rag-app
