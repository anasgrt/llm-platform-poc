apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Prod tags are promoted manually (or by a separate workflow) — never auto-bumped
# from CI. Copy a known-good SHA from overlays/dev/kustomization.yaml after
# verification.
images:
  - name: ghcr.io/anasgrt/qwen3-server
    newTag: main
  - name: ghcr.io/anasgrt/embedding-server
    newTag: main
  - name: ghcr.io/anasgrt/rag-app
    newTag: main
