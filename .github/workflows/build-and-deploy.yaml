name: build-and-deploy

# Builds the 4 in-house images, pushes to GHCR with the git SHA as the tag,
# then commits a kustomize image-tag bump to deploy/overlays/dev. ArgoCD
# (watching the dev overlay) picks up the commit and syncs the cluster.
#
# The bump commit only modifies deploy/overlays/dev/kustomization.yaml, which
# is NOT in the trigger `paths` below, so it does not loop.

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'deploy/base/**'
      - '.github/workflows/build-and-deploy.yaml'
  workflow_dispatch:

permissions:
  contents: write   # commit the tag bump
  packages: write   # push to GHCR

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [qwen3-server, embedding-server, rag-app, ingestion]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./images/${{ matrix.image }}
          # Add linux/arm64 here if the target cluster is arm64. Multi-arch
          # roughly doubles build time; keep amd64 unless needed.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:main
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  bump:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main.
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Bump image tags in dev overlay
        working-directory: deploy/overlays/dev
        run: |
          for img in qwen3-server embedding-server rag-app; do
            kustomize edit set image \
              "ghcr.io/${{ github.repository_owner }}/${img}=ghcr.io/${{ github.repository_owner }}/${img}:${{ github.sha }}"
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No tag changes to commit."
            exit 0
          fi
          git commit -m "ci: bump dev images to ${{ github.sha }}"
          git push origin HEAD:main
