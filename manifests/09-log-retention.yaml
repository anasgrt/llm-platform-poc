---
# Log Retention CronJob
# Deletes Qdrant points older than RETENTION_DAYS from the logs collection.
# Runs daily at 02:00. Adjust schedule or retention via the manifest below.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-retention
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: log-retention
spec:
  schedule: "0 2 * * *"
  timeZone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: log-retention
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: curlimages/curl:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: QDRANT_URL
                  value: "http://qdrant:6333"
                - name: COLLECTION
                  value: "logs"
                - name: RETENTION_DAYS
                  value: "7"
              command:
                - sh
                - -c
                - |
                  set -e
                  CUTOFF=$(date -u -d "${RETENTION_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                           date -u -v-${RETENTION_DAYS}d +%Y-%m-%dT%H:%M:%SZ)
                  echo "Deleting points older than ${CUTOFF} (${RETENTION_DAYS} days) from ${COLLECTION}..."
                  RESP=$(curl -s -X POST \
                    "${QDRANT_URL}/collections/${COLLECTION}/points/delete" \
                    -H 'Content-Type: application/json' \
                    -d "{\"filter\":{\"must\":[{\"key\":\"timestamp\",\"range\":{\"lt\":\"${CUTOFF}\"}}]}}")
                  echo "Qdrant response: ${RESP}"
                  # curl returns HTTP 200 even on partial failure; check for error in body
                  if echo "${RESP}" | grep -q '"status":"error"'; then
                    echo "Retention deletion failed" >&2
                    exit 1
                  fi
                  echo "Retention complete"
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
