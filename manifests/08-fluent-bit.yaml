---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: fluent-bit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: ai-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*_ai-platform_*.log,/var/log/containers/*_monitoring_*.log
        Exclude_Path      *log-analysis-app*,*embedding-server*,*qdrant*,*log-ingestion*
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     16MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              Off

    # Drop empty log lines after CRI parsing
    [FILTER]
        Name      grep
        Match     kube.*
        Regex     log .+

    # Suppress fluent-bit's own per-batch heartbeat noise. We keep startup,
    # filter, and error lines (parser/RBAC/retry events are useful signal),
    # but drop the routine batch acknowledgements that would otherwise
    # dominate every search result.
    [FILTER]
        Name      grep
        Match     kube.*
        Exclude   log \[output:http:http\.0\].*HTTP status=

    [FILTER]
        Name      grep
        Match     kube.*
        Exclude   log ^\{"ingested":[0-9]+,"skipped":[0-9]+\}$

    [OUTPUT]
        Name           http
        Match          kube.*
        Host           log-analysis-app.ai-platform.svc.cluster.local
        Port           8000
        URI            /api/ingest
        Format         json
        json_date_key  @timestamp
        json_date_format iso8601
        Retry_Limit    3

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: fluent-bit
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 2020
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 192Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibcontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibcontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: fluent-bit-config
