---
# ConfigMap "sample-logs" is created by setup.sh via:
#   kubectl create configmap sample-logs --from-file=sample-logs/ -n ai-platform
# Do NOT define it here — an empty data: {} would overwrite the actual log files.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: log-ingestion
  namespace: ai-platform
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ingest
          image: ingestion:latest
          imagePullPolicy: Never
          env:
            - name: EMBED_URL
              value: "http://embedding-server:8080"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: COLLECTION
              value: "logs"
            - name: LOGS_DIR
              value: "/logs"
            - name: CHUNK_SIZE
              value: "15"
          volumeMounts:
            - name: logs
              mountPath: /logs
              readOnly: true
          resources:
            requests:
              memory: 512Mi  # Embedding batches need memory
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: logs
          configMap:
            name: sample-logs
